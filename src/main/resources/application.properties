spring.application.name=mongo-demo
server.port=8085

# Override these via environment variables if needed.
spring.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/mongo_demo}
spring.mongodb.database=mongo_demo
spring.data.mongodb.auto-index-creation=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.org.springframework.data.mongodb=DEBUG
logging.level.org.springframework.boot.actuate.autoconfigure.mongo=DEBUG

